# ============================================================================
# Static site deployment to GitHub Pages
# Author: Noel Segui, CEO of Solar Mason
# Note:   Previously ran a Next.js build. Pivoted to a single-file static
#         HTML deploy served from ./site so we can iterate from the uploaded
#         design baseline and push updates directly.
# ============================================================================
name: Deploy SEMS site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Ensure .nojekyll
        run: touch ./site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
